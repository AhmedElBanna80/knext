name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run Biome lint & format check
        run: pnpm run lint
      
      - name: Run tests
        run: pnpm exec vitest run --coverage
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  compat-smoke:
    # knext adapter SMOKE suite — NOT the official Next.js compatibility suite (ADR-0007,
    # option C). Builds apps/file-manager through the knext adapter (output:'standalone'),
    # boots the standalone server.js on Node and Bun, and asserts real HTTP behaviors.
    # The official deploy-test harness is a separate scheduled job (A3-2, compat-suite-full).
    name: knext adapter smoke (NOT official compat suite)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @knext/lib ships only dist/ — it MUST be built before the app.
      - name: Build @knext/lib
        run: pnpm --filter @knext/lib build

      - name: Build file-manager via adapter
        run: pnpm --filter file-manager build

      - name: Run knext compat-smoke (${{ matrix.runtime }})
        working-directory: apps/file-manager
        env:
          RUNTIME: ${{ matrix.runtime }}
        run: node scripts/compat-smoke.mjs

  cli-node-smoke:
    # #68 — the kn-next CLI must run on plain Node (un-block `npx kn-next`).
    # Builds @knext/core to an EMITTED JS bin and runs `deploy --dry-run` on
    # BOTH Node and Bun. The Node leg deliberately does NOT install Bun, so a
    # green Node run proves the CLI no longer needs Bun. Mirrors the compat-smoke
    # node+bun matrix. Asserts the dry-run prints a NextApp CR (no cluster).
    name: kn-next CLI smoke (Node + Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Bun is installed ONLY for the bun leg. The node leg has no Bun on PATH,
      # which is exactly what proves the CLI runs without it.
      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Emit the runnable JS bin (typecheck + esbuild bundle). No Bun required.
      - name: Build @knext/core CLI (emit JS bin)
        run: pnpm --filter @knext/core build

      - name: Run `<runtime> <emitted-bin> deploy --dry-run` and assert a NextApp CR
        working-directory: packages/kn-next/src/__tests__/fixtures/cli-68
        shell: bash
        run: |
          set -euo pipefail
          BIN="$GITHUB_WORKSPACE/packages/kn-next/dist/cli/deploy.js"
          test -f "$BIN" || { echo "emitted bin missing: $BIN"; exit 1; }
          echo "runtime=${{ matrix.runtime }}"
          OUT="$(${{ matrix.runtime }} "$BIN" deploy --dry-run)"
          echo "$OUT"
          echo "$OUT" | grep -q 'kind: NextApp' \
            || { echo 'FAIL: dry-run did not print a NextApp CR'; exit 1; }
          echo "$OUT" | grep -q 'minScale: 0' \
            || { echo 'FAIL: scale-to-zero (minScale: 0) missing from CR'; exit 1; }

  no-latest-guard:
    name: No :latest images in operator manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check operator manifests are digest-pinned
        run: bash packages/kn-next-operator/hack/check-no-latest.sh --quiet

  operator-codegen-check:
    name: Operator codegen is up-to-date (make generate + make manifests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/kn-next-operator/go.mod
          cache: true
          cache-dependency-path: packages/kn-next-operator/go.sum
      - name: Run make generate
        working-directory: packages/kn-next-operator
        run: make generate
      - name: Run make manifests
        working-directory: packages/kn-next-operator
        run: make manifests
      - name: Fail if codegen produced a diff
        run: |
          if ! git diff --exit-code; then
            echo "ERROR: make generate or make manifests produced uncommitted changes."
            echo "Run 'make generate && make manifests' locally and commit the result."
            exit 1
          fi
